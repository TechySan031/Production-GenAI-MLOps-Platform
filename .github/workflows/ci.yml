# ─────────────────────────────────────────────────────────────────────────────
# CI — Code Quality Gates + Docker Build Verification + AI Evaluation Gates
#
# JOB 1 (code-quality):
#   Runs on every PR and push to main. Zero API calls, fast.
#   Lint → Format → Type check → Security scan → Unit tests + coverage
#
# JOB 2 (docker-build):
#   Verifies the Docker image builds successfully. No push — build only.
#
# JOB 3 (ai-eval-gates):
#   Runs on push to main only (requires GROQ_API_KEY secret).
#   Starts the real application, runs smoke tests (structural only),
#   then runs the eval gate (15 cases × judge scoring ≈ 30 Groq API calls).
#
# Required GitHub Secrets:
#   GROQ_API_KEY — from console.groq.com → API Keys
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Code Quality Gates
  # ──────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check app/ tests/ scripts/

      - name: Ruff — format check
        run: ruff format --check app/ tests/ scripts/

      - name: MyPy — type check
        run: mypy app/ --ignore-missing-imports --disallow-untyped-defs

      - name: Bandit — security scan
        run: bandit -r app/ -ll

      - name: Pytest — unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=75
        env:
          OPENAI_API_KEY: sk-test-not-real
          GROQ_API_KEY: gsk-test-not-real
          LLM_PROVIDER: openai
          LOG_FORMAT: text
          ENVIRONMENT: development
          LANGFUSE_ENABLED: "false"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Docker Build Verification
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: code-quality
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: genai-gateway:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: AI Evaluation Gates
  # Runs on push to main only (requires GROQ_API_KEY secret).
  # ──────────────────────────────────────────────────────────────────────────
  ai-eval-gates:
    name: AI Evaluation Gates
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start gateway (background)
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &

          echo "Waiting for gateway to be ready..."
          READY=false
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              READY=true
              echo "Gateway ready after $((i * 2))s"
              break
            fi
            echo "  Attempt $i/15 — retrying in 2s..."
            sleep 2
          done

          if [ "$READY" != "true" ]; then
            echo "ERROR: Gateway did not become ready in 30s"
            exit 1
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: groq
          GROQ_MODEL: llama-3.1-8b-instant
          LANGFUSE_ENABLED: "false"
          ENVIRONMENT: staging
          LOG_FORMAT: json

      - name: Smoke tests — structural verification
        run: python scripts/smoke_test.py --api-url http://localhost:8000 --skip-inference

      - name: AI evaluation gates
        run: python scripts/eval/run_evals.py --api-url http://localhost:8000
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JUDGE_MODEL: llama-3.3-70b-versatile
          JUDGE_BASE_URL: https://api.groq.com/openai/v1
          JUDGE_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: eval_results.json
          retention-days: 30
